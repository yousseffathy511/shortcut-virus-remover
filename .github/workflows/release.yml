name: Build release executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to stamp into the executable
        required: false
        default: '1.0.7'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Resolve version string
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $version = '${{ github.event.inputs.version }}'
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build ShortcutVirusRemover.exe
        shell: pwsh
        run: ./Build-Exe.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Compute SHA256 of ShortcutVirusRemover.exe
        id: hash
        shell: pwsh
        run: |
          $exe = 'dist/ShortcutVirusRemover.exe'
          if (-not (Test-Path -LiteralPath $exe)) { throw "EXE not found at $exe" }
          $h = ((Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash).ToLowerInvariant()
          echo "exe_sha256=$h" >> $env:GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: ShortcutVirusRemover-${{ steps.version.outputs.version }}
          path: |
            dist/ShortcutVirusRemover.exe
            dist/ShortcutVirusRemover.exe.sha256

      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: softprops/action-gh-release@7b4da11513bf3f43f9999e90eabced41ab8bb048 # v2.2.0
        with:
          files: |
            dist/ShortcutVirusRemover.exe
            dist/ShortcutVirusRemover.exe.sha256
          body: |
            Shortcut Virus Remover - built from commit ${{ github.sha }}.

            EXE SHA-256 (verify with Get-FileHash):
            ${{ steps.hash.outputs.exe_sha256 }}

            A checksum file ShortcutVirusRemover.exe.sha256 is attached.

            Developed by Youssef Fathy / Widescreen.
          prerelease: false
