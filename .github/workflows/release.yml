name: Build release executable

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to stamp into the executable
        required: false
        default: 1.0.6
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          } else {
            $version = '${{ inputs.version }}'
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build ShortcutVirusRemover.exe
        shell: pwsh
        run: |
          ./Build-Exe.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShortcutVirusRemover
          path: |
            dist/ShortcutVirusRemover.exe
            dist/ShortcutVirusRemover.exe.sha256

      # Use GitHub CLI for assets instead of softprops/action-gh-release ť avoids
      # "Request body length does not match content-length header" multipart bugs on windows-latest.
      - name: Publish GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: |
            Download ShortcutVirusRemover.exe, double-click it, and approve the Windows UAC prompt.

            Developed by Youssef Fathy under Widescreen company.

            Open-source Windows tool for removing USB shortcut virus, fake .lnk shortcuts, hidden sysvolume payloads, Trojan:PowerShell/Runner.PGRA!MTB, and Trojan:BAT/Runner.PGRD!MTB.

            A SHA-256 checksum file is attached so users can verify the downloaded executable.

            Windows SmartScreen may warn because the executable is not code-signed. Click "More info", then "Run anyway".
        run: |
          $repo = '${{ github.repository }}'
          $tag = '${{ github.ref_name }}'
          $exe = Join-Path 'dist' 'ShortcutVirusRemover.exe'
          $sha = Join-Path 'dist' 'ShortcutVirusRemover.exe.sha256'
          $notesFile = Join-Path $env:RUNNER_TEMP 'release-notes.md'
          $env:RELEASE_NOTES.Trim() | Set-Content -LiteralPath $notesFile -Encoding utf8

          gh release view $tag --repo $repo 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --repo $repo --yes
          }

          gh release create $tag `
            --repo $repo `
            --title ('Shortcut Virus Remover {0}' -f $tag) `
            --notes-file $notesFile `
            --verify-tag `
            $exe $sha
